name: murtaaxpay_app
description: "MurtaaxPay - Premium Fintech for Somali Diaspora"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0
  smooth_page_indicator: ^2.0.1
  animate_do: ^4.2.0
  glassmorphism: ^3.0.0
  flutter_svg: ^2.0.10+1
  audioplayers: ^6.6.0
  camera: ^0.12.0
  url_launcher: ^6.3.1
  local_auth: ^3.0.1
  lottie: ^3.1.0
  responsive_framework: ^1.5.1
  animations: ^2.0.11
  fl_chart: ^1.2.0 # Charting library lagu daray
  shared_preferences: ^2.3.2
  provider: ^6.1.1
  http: ^1.6.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path_android: "assets/images/app_logo.png"
  image_path_ios: "assets/images/app_logo_ios.jpg"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  generate: true # Enabled for localization
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
